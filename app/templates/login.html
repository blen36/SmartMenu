{% extends "base.html" %}

{% block content %}

<div class="flex justify-center">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Вход в аккаунт
</h2>

{% if error %}

<div class="bg-red-100 text-red-700 p-3 rounded mb-4">
{{error}}
</div>

{% endif %}

<form action="/login-form" method="post" class="space-y-4">

<input
type="email"
name="email"
placeholder="Email"
class="w-full border p-3 rounded"
/>

<input
type="password"
name="password"
placeholder="Password"
class="w-full border p-3 rounded"
/>

<button
class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded"
>

Login

</button>

</form>

<p class="text-center mt-4 text-sm text-slate-600">

Нет аккаунта?

<a href="/register-page" class="text-green-600">
Регистрация
</a>

</p>

</div>

</div>

{% endblock %}
